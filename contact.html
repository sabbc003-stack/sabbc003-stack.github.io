<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>お問い合わせ - テスト</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body{font-family:"Noto Serif JP",serif;background:#f7f4ee;color:#2c2416;margin:0}
    header{background:#1a3a4a;color:#f5f1e8;padding:24px;text-align:center}
    .top-nav a{color:#f5f1e8;margin:0 8px;text-decoration:none;padding:6px 10px;border-radius:6px;transition:all 0.3s ease}
    .top-nav a:hover{color:#fff;box-shadow:0 0 12px rgba(212,165,116,0.6), inset 0 0 12px rgba(212,165,116,0.2)}
    main{max-width:700px;margin:24px auto;padding:0 18px}
    .contact-card{background:#fff;padding:20px;border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,0.06)}
    label{display:block;margin-top:12px;font-weight:600}
    input[type=text],input[type=email],textarea{width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;margin-top:6px}
    button{margin-top:14px;padding:10px 18px;background:#2d5a6a;color:#fff;border:none;border-radius:6px;cursor:pointer}
    .phone{margin-top:8px}
    footer{padding:20px;text-align:center;color:#7a6b57}
    footer a{color:#7a6b57;text-decoration:none;transition:all 0.3s ease}
    footer a:hover{box-shadow:0 0 8px rgba(122,107,87,0.4)}
  </style>
</head>
<body>
  <header>
    <h1>お問い合わせ</h1>
    <nav class="top-nav">
      <a href="index.html">ホーム</a>
      <a href="history.html">歴史</a>
      <a href="gallery.html">ブログ</a>
      <a href="news.html">お知らせ</a>
      <a href="contact.html">お問い合わせ</a>
    </nav>
  </header>

  <main>
    <div class="contact-card">
      <p>お電話でのお問い合わせ：<span class="phone"><a href="tel:0000">0000</a></span></p>

      <form id="contactForm" onsubmit="return sendMail();">
        <label for="name">お名前</label>
        <input type="text" id="name" name="name" required>

        <label for="email">メールアドレス</label>
        <input type="email" id="email" name="email" required>

        <label for="message">お問い合わせ内容</label>
        <textarea id="message" name="message" rows="6" required></textarea>

        <button type="submit">メールで送信</button>
      </form>

      <p style="margin-top:12px;color:#6b5b47;font-size:0.9rem">※ 送信ボタンで既定のメールアプリが開きます。受信用メールアドレスは <strong>info@example.com</strong> に設定しています。必要に応じて編集してください。</p>
    </div>
  </main>

  <footer>
    <a href="index.html">ホームに戻る</a>
  </footer>

  <script>
    function sendMail(){
      var name = encodeURIComponent(document.getElementById('name').value || '');
      var email = encodeURIComponent(document.getElementById('email').value || '');
      var message = encodeURIComponent(document.getElementById('message').value || '');
      var to = 'info@example.com';
      var subject = encodeURIComponent('お問い合わせ：' + name);
      var body = encodeURIComponent('送信者: ' + name + '\nメール: ' + email + '\n\n' + message);
      var mailto = 'mailto:' + to + '?subject=' + subject + '&body=' + body;
      window.location.href = mailto;
      return false;
    }
  </script>
</body>
</html>
