<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>テスト | 和のぬくもり</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: "Noto Serif JP", serif;
      background: linear-gradient(135deg, #f5f1e8 0%, #ede6d3 100%);
      color: #2c2416;
      line-height: 1.8;
    }
    
    /* ヘッダー */
    header {
      background: linear-gradient(to bottom, #1a3a4a, #2d5a6a);
      color: #f5f1e8;
      padding: 60px 20px;
      text-align: center;
      border-bottom: 8px solid #d4a574;
      position: relative;
      overflow: hidden;
    }
    
    header::before {
      content: "";
      position: absolute;
      top: -30%;
      right: -5%;
      width: 350px;
      height: 350px;
      background: radial-gradient(circle, rgba(212, 165, 116, 0.25) 0%, rgba(212, 165, 116, 0.08) 70%, transparent 100%);
      border-radius: 50%;
      filter: blur(2px);
    }
    
    header::after {
      content: "";
      position: absolute;
      bottom: -20%;
      left: 10%;
      width: 250px;
      height: 250px;
      background: radial-gradient(circle, rgba(212, 165, 116, 0.12) 0%, transparent 70%);
      border-radius: 50%;
      filter: blur(3px);
    }
    
    header h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      margin: 0;
      letter-spacing: 0.15em;
      position: relative;
      z-index: 1;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
    }
    
    header .subtitle {
      font-size: 1rem;
      margin-top: 12px;
      opacity: 0.95;
      letter-spacing: 0.08em;
    }
    
    /* 英語タグ */
    .tagline {
      font-size: 0.85rem;
      color: #d4a574;
      margin-top: 8px;
      letter-spacing: 0.12em;
    }

    /* ナビ */
    .top-nav {
      margin-top: 14px;
    }
    .top-nav a {
      color: #f5f1e8;
      text-decoration: none;
      margin: 0 8px;
      padding: 6px 10px;
      border-radius: 6px;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
    }
    .insta-link {
      background: rgba(212, 165, 116, 0.15);
      color: #d4a574 !important;
      font-weight: 600;
      border: 2px solid #d4a574;
      margin-left: 18px;
      box-shadow: 0 2px 8px rgba(212, 165, 116, 0.2);
    }
    .insta-link:hover {
      background: rgba(212, 165, 116, 0.3);
      color: #1a3a4a !important;
      box-shadow: 0 0 16px rgba(212, 165, 116, 0.5);
      border-color: #1a3a4a;
    }
    .youtube-link {
      background: rgba(212, 165, 116, 0.12);
      color: #d4a574 !important;
      font-weight: 600;
      border: 2px solid #d4a574;
      margin-left: 10px;
      box-shadow: 0 2px 8px rgba(212, 165, 116, 0.15);
    }
    .youtube-link:hover {
      background: rgba(212, 165, 116, 0.28);
      color: #1a3a4a !important;
      box-shadow: 0 0 16px rgba(212, 165, 116, 0.45);
      border-color: #1a3a4a;
    }
    .top-nav a:hover {
      background: rgba(212,165,116,0.12);
      color: #fff;
      box-shadow: 0 0 12px rgba(212,165,116,0.6), inset 0 0 12px rgba(212,165,116,0.2);
    }

    /* タイトル画像 */
    .hero-image {
      display: block;
      margin: 32px auto 32px auto;
      max-width: 90vw;
      max-height: 180px;
      width: auto;
      height: auto;
      object-fit: contain;
      border-radius: 14px;
      box-shadow: 0 4px 24px rgba(26,58,74,0.13), 0 0 0 4px #e6ddd0;
      background: #fffdfa;
      border: 2px solid #e6ddd0;
      transition: box-shadow 0.3s, transform 0.3s;
    }
    .hero-image:hover {
      box-shadow: 0 0 32px 6px #d4a574, 0 4px 16px rgba(26,58,74,0.10);
      transform: scale(1.03) rotate(-1deg);
      border-color: #d4a574;
      z-index: 2;
    }
    
    /* メインコンテンツ */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 60px 20px;
    }
    
    .section-title {
      text-align: center;
      font-size: 2.2rem;
      margin-bottom: 50px;
      color: #1a3a4a;
      position: relative;
      padding-bottom: 20px;
    }
    
    .section-title::after {
      content: "";
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 80px;
      height: 3px;
      background: linear-gradient(to right, transparent, #d4a574, transparent);
    }
    
    /* カードグリッド */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 30px;
      margin-bottom: 60px;
    }
    
    .card {
      background: #ffffff;
      border-radius: 8px;
      padding: 30px;
      box-shadow: 0 8px 24px rgba(26, 58, 74, 0.12);
      border-left: 5px solid #d4a574;
      transition: all 0.3s ease;
      position: relative;
      text-decoration: none;
      color: inherit;
    }
    
    .card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, #2d5a6a, transparent);
    }
    
    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 0 0 4px rgba(212,165,116,0.25), 0 12px 32px rgba(26, 58, 74, 0.18);
      border-color: #ffd699;
      z-index: 1;
    }
    
    .card-icon {
      font-size: 2.5rem;
      margin-bottom: 15px;
    }
    
    .card h2 {
      font-size: 1.4rem;
      color: #1a3a4a;
      margin-bottom: 12px;
      font-weight: 600;
    }
    
    .card p {
      color: #555;
      font-size: 0.95rem;
    }
    
    /* About セクション */
    .about-section {
      background: linear-gradient(135deg, rgba(26, 58, 74, 0.05), rgba(212, 165, 116, 0.05));
      padding: 40px;
      border-radius: 8px;
      border-left: 5px solid #d4a574;
      margin-bottom: 60px;
    }
    
    .about-section h3 {
      color: #1a3a4a;
      font-size: 1.6rem;
      margin-bottom: 20px;
    }
    
    .about-section p {
      color: #555;
      line-height: 1.9;
      margin-bottom: 15px;
    }
    
    /* CTA ボタン */
    .cta-container {
      text-align: center;
      margin: 60px 0;
    }
    
    .cta-button {
      display: inline-block;
      background: linear-gradient(135deg, #1a3a4a, #2d5a6a);
      color: #f5f1e8;
      padding: 16px 40px;
      border-radius: 6px;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      transition: all 0.3s ease;
      border: 2px solid transparent;
      cursor: pointer;
    }
    
    .cta-button:hover {
      background: transparent;
      color: #1a3a4a;
      border-color: #1a3a4a;
      transform: scale(1.05);
    }
    
    /* フッター */
    footer {
      background: #1a3a4a;
      color: #d4a574;
      text-align: center;
      padding: 30px 20px;
      border-top: 4px solid #d4a574;
      font-size: 0.9rem;
      letter-spacing: 0.06em;
    }
    
    footer a {
      color: #d4a574;
      text-decoration: none;
      transition: all 0.3s ease;
    }
    
    footer a:hover {
      box-shadow: 0 0 12px rgba(212, 165, 116, 0.6);
    }
    
    @media (max-width: 768px) {
      header {
        padding: 40px 16px;
      }
      
      .section-title {
        font-size: 1.8rem;
      }
      
      .cards-grid {
        gap: 20px;
      }
      
      .card {
        padding: 20px;
      }
    }
  </style>
</head>
<body>

      <h1>👊テスト👊</h1>

      <nav class="top-nav">
