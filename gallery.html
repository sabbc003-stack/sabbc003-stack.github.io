<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ブログ - テスト</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body{font-family:"Noto Serif JP",serif;background:#f7f4ee;color:#2c2416;margin:0}
    header{background:#1a3a4a;color:#f5f1e8;padding:24px;text-align:center}
    .top-nav a{color:#f5f1e8;margin:0 8px;text-decoration:none;padding:6px 10px;border-radius:6px;transition:all 0.3s ease}
    .top-nav a:hover{color:#fff;box-shadow:0 0 12px rgba(212,165,116,0.6), inset 0 0 12px rgba(212,165,116,0.2)}
    main{max-width:1000px;margin:24px auto;padding:0 18px}
    .gallery{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:18px}
    .photo{background:#fff;padding:12px;border-radius:8px;box-shadow:0 8px 20px rgba(0,0,0,0.06)}
    .photo img{width:100%;height:200px;object-fit:cover;border-radius:6px}
    .meta{margin-top:8px;color:#6b5b47;font-size:0.95rem}
    footer{padding:20px;text-align:center;color:#7a6b57}
    footer a{color:#7a6b57;text-decoration:none;transition:all 0.3s ease}
    footer a:hover{box-shadow:0 0 8px rgba(122,107,87,0.4)}
  </style>
</head>
<body>
  <header>
    <h1>ブログ</h1>
    <nav class="top-nav">
      <a href="index.html">ホーム</a>
      <a href="history.html">歴史</a>
      <a href="gallery.html">ブログ</a>
      <a href="news.html">お知らせ</a>
      <a href="contact.html">お問い合わせ</a>
    </nav>
  </header>

  <main>
    <p>サンプル写真：日時と簡単なタイトル付きで表示します。</p>
    <div class="gallery">
      <div class="photo">
        <img src="たこ焼き.png" alt="たこ焼き">
        <div class="meta"><strong>2026-03-20</strong> — たこ焼き大会</div>
      </div>
      <div class="photo">
        <img src="タピオカ.png" alt="タピオカ">
        <div class="meta"><strong>2025-09-14</strong> — タピオカフェス</div>
      </div>
      <div class="photo">
        <img src="とうもろこし.png" alt="とうもろこし">
        <div class="meta"><strong>2024-07-28</strong> — 収穫祭（とうもろこし）</div>
      </div>
    </div>
  </main>

  <footer>
    <a href="index.html">ホームに戻る</a>
  </footer>
</body>
</html>
